<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply Now</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f8f9fa;
}
.form-box {
    max-width: 500px;
    margin: auto;
    margin-top: 50px;
    padding: 30px;
    background: white;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="form-box">
    <h3 class="text-center mb-4">Loan Application Form</h3>

    <form action="https://formsubmit.co/smoothcapital3@gmail.com" method="POST">

        <input type="text" name="Name" class="form-control mb-3" placeholder="Full Name" required>

        <input type="tel" name="Phone" class="form-control mb-3" placeholder="Phone Number" required>

        <input type="email" name="Email" class="form-control mb-3" placeholder="Email ID" required>

        <input type="text" name="City" class="form-control mb-3" placeholder="City" required>

        <input type="text" name="PinCode" class="form-control mb-3" placeholder="Pin Code" required>

        <button type="submit" class="btn btn-primary w-100">Submit Application</button>

    </form>
</div>

</body>
</html>
